<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - WorkFlex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0f19; 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 15px; 
        }
        .signup-card { 
            background: #111827; 
            border: 2px solid #06b6d4; 
            border-radius: 16px; 
            padding: 2.5rem; 
            width: 100%; 
            max-width: 480px; 
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3); 
        }
        
        /* Strict global override for all form text elements */
        .signup-card p, 
        .signup-card label, 
        .signup-card form,
        .signup-card .helptext,
        .signup-card ul li { 
            color: #ffffff !important; 
            text-align: left !important; 
            margin-bottom: 10px !important; 
            font-weight: 700 !important; 
            font-size: 0.95rem !important;
            letter-spacing: 0.5px;
        }

        /* Help text (jaise 150 characters or fewer) ko chota aur clean white karna */
        .signup-card .helptext {
            font-size: 0.8rem !important;
            font-weight: 500 !important;
            color: #cbd5e1 !important;
            margin-top: -5px !important;
            margin-bottom: 15px !important;
        }

        /* Input fields layout styling */
        .signup-card input[type="text"],
        .signup-card input[type="email"],
        .signup-card input[type="password"] { 
            background-color: #1f2937 !important; 
            border: 2px solid #ffffff !important; 
            color: #06b6d4 !important; 
            padding: 0.85rem !important; 
            border-radius: 8px !important; 
            width: 100% !important; 
            display: block !important;
            font-weight: 600 !important;
            margin-bottom: 5px !important;
        }
        
        /* Radio buttons and list adjustments for choice fields */
        .signup-card ul {
            list-style: none !important;
            padding-left: 0 !important;
            margin-top: 10px !important;
        }
        .signup-card ul li {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px !important;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 8px !important;
        }
        .signup-card input[type="radio"] {
            transform: scale(1.3);
            margin-left: 5px;
            cursor: pointer;
        }

        .btn-cyan { 
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); 
            color: #ffffff !important; 
            border: none; 
            padding: 0.85rem; 
            font-weight: 700; 
            border-radius: 8px; 
            width: 100%; 
            margin-top: 20px;
            font-size: 1rem;
            text-transform: uppercase;
        }
        .btn-cyan:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(6, 182, 212, 0.4);
        }
    </style>
</head>
<body>
<div class="signup-card text-center">
    <h1 class="fw-bold text-white mb-2" style="letter-spacing: -1px;">WorkFlex</h1>
    <p style="color: #22d3ee !important; font-weight: 500 !important;" class="small text-center mb-4">Create your workspace identity protocol</p>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2 small text-start fw-bold" style="color: #ff4b4b; background: rgba(255,75,75,0.1); border: 1px solid #ff4b4b;">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" class="btn btn-cyan">Register Account</button>
    </form>
    <p class="mb-0 mt-4" style="color: #ffffff !important; font-weight: 500 !important;">Already an operator? <a href="{% url 'login' %}" style="color: #22d3ee !important; text-decoration: none; font-weight: bold; border-bottom: 2px solid #22d3ee;">Login here</a></p>
</div>
</body>
</html>
