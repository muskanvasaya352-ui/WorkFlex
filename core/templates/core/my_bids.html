<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>My Bids - WorkFlex</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background-color: #0b0f19; color: #f3f4f6; padding: 30px;">
<div class="container"><a href="{% url 'home' %}" class="btn btn-sm btn-outline-secondary mb-4">← Dashboard</a><h2 class="text-white mb-4">Your Lodged Bid Protocols</h2>
{% for bid in bids %}<div class="p-3 mb-2 rounded border border-secondary" style="background: #111827;"><h5 class="text-white">{{ bid.project.title }}</h5><p class="text-muted small">{{ bid.proposal }}</p><div class="d-flex justify-content-between"><strong>Bid Amount: ${{ bid.amount }}</strong><span class="badge bg-info">{{ bid.status }}</span></div></div>{% empty %}<p class="text-muted">No bids found.</p>{% endfor %}</div></body></html>
