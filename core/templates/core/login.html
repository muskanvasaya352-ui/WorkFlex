<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WorkFlex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        .login-card { background: #111827; border: 2px solid #3b82f6; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2); }
        .form-control { background-color: #1f2937; border: 2px solid #4b5563; color: #ffffff; padding: 0.75rem; border-radius: 8px; }
        .form-control:focus { background-color: #1f2937; border-color: #3b82f6; color: #ffffff; box-shadow: none; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); border: none; padding: 0.75rem; font-weight: 600; border-radius: 8px; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
        .bright-text { color: #cbd5e1 !important; }
    </style>
</head>
<body>
<div class="login-card text-center">
    <h1 class="fw-bold text-white mb-2" style="letter-spacing: -1px;">WorkFlex</h1>
    <p class="bright-text small mb-4">Secure Network Access Protocol</p>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2 small text-start">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label class="form-label text-white small fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label text-white small fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Authorize Session</button>
    </form>
    
    <div class="mt-4 p-2 rounded" style="background: rgba(255,255,255,0.03); border: 1px dashed #3b82f6;">
        <p class="bright-text small mb-0">New User? 
            <a href="/signup/" style="color: #22d3ee; text-decoration: none; font-weight: 700; border-bottom: 2px solid #22d3ee; padding-bottom: 2px;">
                Create New Account (Signup)
            </a>
        </p>
    </div>
</div>
</body>
</html>
