<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>My Projects - WorkFlex</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background-color: #0b0f19; color: #f3f4f6; padding: 30px;">
<div class="container"><a href="{% url 'home' %}" class="btn btn-sm btn-outline-secondary mb-4">← Dashboard</a><h2 class="text-white mb-4">Your Managed Workspace Projects</h2>
{% for project in projects %}<div class="p-3 mb-2 rounded border border-secondary" style="background: #111827;"><h5 class="text-white">{{ project.title }}</h5><p class="text-muted small">Budget Allocation: <strong>${{ project.budget }}</strong></p><a href="{% url 'project_detail' project.pk %}" class="btn btn-xs btn-primary p-1 fs-7">Manage Project Room</a></div>{% empty %}<p class="text-muted">No projects found.</p>{% endfor %}</div></body></html>
